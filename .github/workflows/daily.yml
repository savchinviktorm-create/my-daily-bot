name: Daily Report
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script
        env:
          TOKEN: ${{ secrets.TOKEN }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python main.py
