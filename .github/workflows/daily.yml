name: Daily Report

on:
  schedule:
    # 05:00 UTC — це 07:00 за Києвом (Ранковий звіт)
    - cron: '0 5 * * *'
    # 12:00 UTC — це 14:00 за Києвом (Денний звіт)
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Дозволяє запускати бота вручну кнопкою "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Якщо у тебе будуть додаткові бібліотеки, додамо їх сюди

      - name: Run Telegram Bot Script
        env:
          TOKEN: ${{ secrets.TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python main.py
